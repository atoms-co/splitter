syntax = "proto3";

package atoms.splitter;

import "google/protobuf/timestamp.proto";
import "atoms/splitter/lib/service/location/location.proto";
import "atoms/splitter/lib/service/session/session.proto";
import "splitter/proto/public_v1/management.proto";

option java_multiple_files = true;
option go_package = "go.atoms.co/splitter/pb";
option java_package = "co.atoms.splitter.pb";

// DomainKey specifies a domain element for an implicit domain.
message DomainKey {
  string region = 1;
  string key = 2;
}

// QualifiedDomainKey fully specifies a domain element.
message QualifiedDomainKey {
  QualifiedDomainName domain = 1;
  DomainKey key = 2;
}

// Instance defines an addressable dynamic component instance. Immutable.
message Instance {
  atoms.splitter.lib.service.location.Instance client = 1;
  string endpoint = 2;
}

// Shard is a unit of work. Usually it is a continuous subrange of UUIDs, but can also span the whole UUID space.
message Shard {
  QualifiedDomainName domain = 1;
  Domain.Type type = 2;
  // Region is the optional region of the shard.
  string region = 3;
  string from = 4;
  string to = 5;
}

enum GrantState {
  UNKNOWN = 0;
  ALLOCATED = 1;
  ACTIVE = 2;
  REVOKED = 3;
}

// Grant represents a shard with a lease.
message Grant {
  string id = 1;
  Shard shard = 2;
  GrantState state = 3;

  google.protobuf.Timestamp lease = 4;
  // Assigned is the time when this grant was assigned to the shard with the status
  google.protobuf.Timestamp assigned = 5;
}

// Register must be the first message from the consumer on connect. If a re-connect, the server may already know about
// the consumer, in which case existing assignments are generally chosen to continue to minimize disruption (assuming
// the consumer lease has not expired meanwhile).
message Register {
  Instance consumer = 1;
  QualifiedServiceName service = 2;
  repeated QualifiedDomainName domains = 3;
  repeated Grant active = 4; // Active grants with non-expired leases.
}

// Deregister indicates that the consumer will soon disappear, usually restarted in ~30s. The server should initiate a
// graceful drain of responsibilities by marking all shards as revoked and wait for them to relinquish. No new work
// should be assigned to the consumer.
message Deregister {
}

// Released returns the voluntary exclusive lease for the given grants back to the server. It is usually sent in
// response to REVOKE before the lease expires.
message Released {
  repeated string grants = 1;
}

// Extend extends all granted shard leases
message Extend {
  google.protobuf.Timestamp lease = 1;
}

// Assign grants shard leases to the consumer for ownership.
// The server must explicitly re-grant unexpired shard leases for reconnected consumers.
message Assign {
  repeated Grant grants = 1;
}

// Revoke gracefully revokes previously granted shard leases.
// The consumer should relinquish the shard leases instead of letting them expire for faster re-assignment.
message Revoke {
  repeated string grants = 1;
}

// ClusterMessage represents an update in tenant ownership. The initial update contains a full routing table.
message ClusterMessage {
  // GrantInfo is information about a grant assigned to some consumer. It only contains information relevant
  // to the consumers not owning the grant (e.g. lease is excluded).
  message GrantInfo {
    string id = 1;
    Shard shard = 2;
    GrantState state = 3;
  }

  // Assignment a list of grants assigned to a consumer. This can be a full or a partial list of grants.
  message Assignment {
    Instance consumer = 1;
    repeated GrantInfo grants = 2;
  }

  // Snapshot contains assignments for all known consumers, including consumers without grants.
  message Snapshot {
    repeated Assignment assignments = 1;
  }

  // Assign contains changes in grant ownership. The list of consumer grants is partial and only contains
  // assigned grants.
  message Assign {
    repeated Assignment assignments = 1;
  }

  // Update indicates a change in a grant state.
  message Update {
    repeated GrantInfo grants = 1;
  }

  // Unassign signals that grants are not owned by consumers.
  message Unassign {
    repeated string grants = 1;
  }

  // Detach signals removal of the consumers from the work distribution process.
  message Detach {
    repeated string consumers = 1;
  }

  oneof msg {
    Snapshot snapshot = 1;
    Assign assign = 2;
    Update update = 3;
    Unassign unassign = 4;
    Detach detach = 5;
  }
}

// ConsumerMessage is a message sent from a consumer to a coordinator
message ConsumerMessage {
  oneof msg {
    atoms.splitter.lib.service.service.Message session = 1;
    Register register = 2;
    Deregister deregister = 3;
    Released released = 4;
    Extend extend = 5;
    Assign assign = 6;
    Revoke revoke = 7;
    ClusterMessage cluster = 8;
  }
}
