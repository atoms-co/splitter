syntax = "proto3";

package atoms.splitter;

import "atoms/splitter/lib/service/session/session.proto";

option java_multiple_files = true;
option go_package = "go.atoms.co/splitter/pb";
option java_package = "co.atoms.splitter.pb";

// Consumer defines a domain consumer.
message Consumer {
  atoms.splitter.lib.service.service.ClientDefinition client = 1;
  string endpoint = 2;
}
