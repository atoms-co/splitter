syntax = "proto3";

package atoms.splitter.private;

option java_multiple_files = true;
option go_package = "go.atoms.co/splitter/pb/private";

message RaftJoinRequest {
  string id = 1;
  string addr = 2;
}

message RaftJoinResponse {
}

service RaftService {
  rpc Join (RaftJoinRequest) returns (RaftJoinResponse);
}
