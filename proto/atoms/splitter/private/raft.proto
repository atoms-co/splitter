syntax = "proto3";

package atoms.splitter.private;

option java_multiple_files = true;
option go_package = "go.atoms.co/splitter/pb/private";

message JoinRequest {
  string id = 1;
  string addr = 2;
}

message JoinResponse {
}

service RaftService {
  rpc Join (JoinRequest) returns (JoinResponse);
}
