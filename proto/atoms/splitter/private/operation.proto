syntax = "proto3";

package atoms.splitter.private;

import "splitter/proto/internal_v1/state.proto";
import "splitter/proto/public_v1/consumer.proto";
import "splitter/proto/public_v1/management.proto";

option java_multiple_files = true;
option go_package = "go.atoms.co/splitter/pb/private";

message RaftInfoRequest {

}

message RaftInfoResponse {
  map<string, string> raft_state = 1;
}

message RestoreRequest {
  bool nuke = 1;
}

message RestoreResponse {
  atoms.splitter.private.Snapshot snapshot = 1;
}

message CoordinatorInfoRequest {
  atoms.splitter.QualifiedServiceName service = 1;
}

message CoordinatorInfoResponse {
  repeated atoms.splitter.Instance consumers = 1;
  atoms.splitter.ClusterMessage.Snapshot snapshot = 2;
}

message CoordinatorRestartRequest {
  atoms.splitter.QualifiedServiceName service = 1;
}

message CoordinatorRestartResponse {

}

// OperationService is the internal service for operational apis.
service OperationService {
  // RaftInfo sends an info request to a raft server.
  rpc RaftInfo (RaftInfoRequest) returns (RaftInfoResponse);

  // Restore flushes the current leader snapshot to the storage.
  rpc Restore (RestoreRequest) returns (RestoreResponse);

  // CoordinatorInfo sends an info request to a Coordinator.
  rpc CoordinatorInfo (CoordinatorInfoRequest) returns (CoordinatorInfoResponse);

  // CoordinatorRestart sends an restart request to a Coordinator.
  rpc CoordinatorRestart (CoordinatorRestartRequest) returns (CoordinatorRestartResponse);
}
