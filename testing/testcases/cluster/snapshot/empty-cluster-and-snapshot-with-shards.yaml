# Snapshot with only shards on an empty cluster must be applied correctly.
actions:
  - action: create

  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(a:d),type=G

  - action: compare
    version: 2
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(a:d),type=G

  - action: lookup
    lookups:
      - key: "1"
        expected:
          found: false
