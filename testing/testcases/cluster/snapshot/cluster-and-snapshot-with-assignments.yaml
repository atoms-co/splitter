# Apply snapshot with only assignments to a cluster with existing grants.
actions:
  - action: create
  - action: snapshot
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
      - consumer: c2
        grants: []
      - consumer: c3
        grants:
          - id: AD
            shard: range=(a:d),type=G
            state: active

  # Update with new assignments and empty shards
  - action: snapshot
    assignments:
      - consumer: c1
        grants:
          - id: DE_Allocated
            shard: range=(d:e),type=G
            state: allocated
      - consumer: c3
        grants: []
      - consumer: c4
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked

  # Shards should be created from the new assignments. Old shards should be removed
  # Consumer grants should be created from the new assignments. Old consumers without grants are removed
  - action: compare
    version: 3
    shards:
      - shard: range=(d:e),type=G
        grants: [DE_Allocated, DE_Revoked]
    assignments:
      - consumer: c1
        grants:
          - id: DE_Allocated
            shard: range=(d:e),type=G
            state: allocated
      - consumer: c3
        grants: []
      - consumer: c4
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked

  # Lookup grants should use the new grants
  - action: lookup
    lookups:
      - key: "d"
        states: allocated
        expected:
          grant: DE_Allocated
          consumer: c1
      - key: "d"
        expected:
          grant: DE_Revoked
          consumer: c4
      - key: "1"
        expected:
          found: false
      - key: "a"
        expected:
          found: false

  # Repeat again
  - action: snapshot
    assignments:
      - consumer: c1
        grants:
          - id: DE_Allocated
            shard: range=(d:e),type=G
            state: allocated
      - consumer: c3
        grants: []
      - consumer: c4
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked

  - action: compare
    version: 4
    shards:
      - shard: range=(d:e),type=G
        grants: [DE_Allocated, DE_Revoked]
    assignments:
      - consumer: c1
        grants:
          - id: DE_Allocated
            shard: range=(d:e),type=G
            state: allocated
      - consumer: c3
        grants: []
      - consumer: c4
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked

  - action: lookup
    lookups:
      - key: "d"
        states: allocated
        expected:
          grant: DE_Allocated
          consumer: c1
      - key: "d"
        expected:
          grant: DE_Revoked
          consumer: c4
      - key: "1"
        expected:
          found: false
      - key: "a"
        expected:
          found: false
