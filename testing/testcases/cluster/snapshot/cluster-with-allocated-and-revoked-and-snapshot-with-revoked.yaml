# Allocated grant should be kept after applying a snapshot with a revoked grant to the same shard
actions:
  - action: create

  # Snapshot with allocated and revoked grants for the same shard
  - action: snapshot
    assignments:
      - consumer: c1
        grants:
          - id: DE_Allocated
            shard: range=(d:e),type=G
            state: allocated
      - consumer: c2
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked
    shards:
      - shard: range=(d:e),type=G

  # Apply a new snapshot that only has revoked grant
  - action: snapshot
    assignments:
      - consumer: c2
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked
    shards:
      - shard: range=(d:e),type=G

  # Allocated grant should be kept
  - action: compare
    version: 3
    shards:
      - shard: range=(d:e),type=G
        grants: [DE_Allocated, DE_Revoked]
    assignments:
      - consumer: c1
        origin_cluster_version: 2
        grants:
          - id: DE_Allocated
            shard: range=(d:e),type=G
            state: allocated
            origin_cluster_version: 2
      - consumer: c2
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked

  # Lookup grants should include the revoked grant
  - action: lookup
    lookups:
      - key: "d"
        states: allocated
        expected:
          grant: DE_Allocated
          consumer: c1
      - key: "d"
        expected:
          grant: DE_Revoked
          consumer: c2

  # Apply a new snapshot that has the old revoked grant updated to unloaded
  - action: snapshot
    assignments:
      - consumer: c2
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: unloaded
    shards:
      - shard: range=(d:e),type=G

  # Revoked grant should be updated and allocated grant should be kept
  - action: compare
    version: 4
    shards:
      - shard: range=(d:e),type=G
        grants: [DE_Allocated, DE_Revoked]
    assignments:
      - consumer: c1
        origin_cluster_version: 2
        grants:
          - id: DE_Allocated
            shard: range=(d:e),type=G
            state: allocated
            origin_cluster_version: 2
      - consumer: c2
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: unloaded

  # Lookup grants should include the revoked and the loaded grants
  - action: lookup
    lookups:
      - key: "d"
        states: allocated
        expected:
          grant: DE_Allocated
          consumer: c1
      - key: "d"
        states: revoked
        expected:
          found: false
      - key: "d"
        states: unloaded
        expected:
          grant: DE_Revoked
          consumer: c2
