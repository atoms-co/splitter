# Non-empty cluster and empty snapshot should keep old grants and remove empty consumers.
actions:
  - action: create

  # Apply snapshot with some assignments and empty consumers
  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(a:d),type=G
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
      - consumer: c2
        grants: []
      - consumer: c3
        grants:
          - id: AD
            shard: range=(a:d),type=G
            state: active

  # Update with empty assignments and empty shards
  - action: snapshot

  # Consumer without grants should be removed. Old grants must be kept.
  - action: compare
    version: 3
    shards:
      - shard: range=(0:a),type=G
        grants: [0A]
      - shard: range=(a:d),type=G
        grants: [AD]
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
            origin_cluster_version: 2
      - consumer: c3
        grants:
          - id: AD
            shard: range=(a:d),type=G
            state: active
            origin_cluster_version: 2

  - action: lookup
    lookups:
      - key: "1"
        expected:
          grant: 0A
          consumer: c1
      - key: "a"
        expected:
          grant: AD
          consumer: c3
