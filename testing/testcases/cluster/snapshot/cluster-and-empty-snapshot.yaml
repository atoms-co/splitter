# Non-empty cluster and empty snapshot should remove grants and remove empty consumers.
actions:
  - action: create

  # Apply snapshot with some assignments and empty consumers
  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(a:d),type=G
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
      - consumer: c2
        grants: []
      - consumer: c3
        grants:
          - id: AD
            shard: range=(a:d),type=G
            state: active

  # Update with empty assignments and empty shards
  - action: snapshot

  # All grants and consumer must be removed
  - action: compare
    version: 3
    shards: []
    assignments: []

  - action: lookup
    lookups:
      - key: "1"
        expected:
          found: false
      - key: "a"
        expected:
          found: false
