# Snapshot with only assignments on an empty cluster must be applied correctly.
actions:
  - action: create
  - action: snapshot
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
          - id: AD
            shard: range=(a:d),type=G
            state: active
      - consumer: c2
        grants: []
  - action: compare
    version: 2
    shards:
      - shard: range=(0:a),type=G
        grants: [0A]
      - shard: range=(a:d),type=G
        grants: [AD]
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
          - id: AD
            shard: range=(a:d),type=G
            state: active
      - consumer: c2
        grants: []
  - action: lookup
    lookups:
      - key: "1"
        expected:
          grant: 0A
          consumer: c1
      - key: "a"
        expected:
          grant: AD
          consumer: c1
