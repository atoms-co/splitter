# Unassigned retained grant should be removed from the cluster.
actions:
  - action: create
  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(d:e),type=G
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
      - consumer: c2
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked

  # Mark grant as retained
  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(d:e),type=G

  # Assign the retained grant to make it current
  - action: change
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active

  # Update an existing grant
  - action: change
    updated:
      - id: 0A
        shard: range=(0:a),type=G
        state: revoked

  # Grant should be updated
  - action: compare
    version: 5
    shards:
      - shard: range=(0:a),type=G
        grants: [0A]
      - shard: range=(d:e),type=G
        grants: [DE_Revoked]
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: revoked
      - consumer: c2
        origin_cluster_version: 2
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked
            origin_cluster_version: 2

  - action: lookup
    lookups:
      - key: "1"
        expected:
          grant: 0A
          consumer: c1
      - key: "1"
        states: revoked
        expected:
          grant: 0A
          consumer: c1
      - key: "1"
        states: allocated
        expected:
          found: false
      - key: "d"
        expected:
          grant: DE_Revoked
          consumer: c2
