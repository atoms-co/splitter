# An existing consumer with retained grants is removed from the cluster.
# All its grants should be removed too.
actions:
  - action: create
  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(d:e),type=G
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked

  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(d:e),type=G
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active

  - action: compare
    version: 3
    shards:
      - shard: range=(0:a),type=G
        grants: [0A]
      - shard: range=(d:e),type=G
        grants: [DE_Revoked]
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked
            origin_cluster_version: 2

  # Remove an existing consumer
  - action: change
    removed: [c1]

  # Consumer and its grants should be removed
  - action: compare
    version: 4
    shards:
      - shard: range=(0:a),type=G
        grants: []
      - shard: range=(d:e),type=G
        grants: []

  - action: lookup
    lookups:
      - key: "1"
        expected:
          found: false
      - key: "d"
        expected:
          found: false
