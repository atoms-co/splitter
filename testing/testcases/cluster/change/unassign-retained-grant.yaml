# Unassigned retained grant should be removed from the cluster.
actions:
  - action: create
  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(d:e),type=G
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active
      - consumer: c2
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked

  # Mark grant as retained
  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
      - shard: range=(d:e),type=G

  # Assign the retained grant to make it current
  - action: change
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active

  # Unassign an existing grant
  - action: change
    unassigned:
      - 0A

  # Grant should be removed
  - action: compare
    version: 5
    shards:
      - shard: range=(0:a),type=G
        grants: []
      - shard: range=(d:e),type=G
        grants: [DE_Revoked]
    assignments:
      - consumer: c1
      - consumer: c2
        grants:
          - id: DE_Revoked
            shard: range=(d:e),type=G
            state: revoked
            origin_cluster_version: 2

  - action: lookup
    lookups:
      - key: "1"
        expected:
          found: false
      - key: "d"
        expected:
          grant: DE_Revoked
          consumer: c2
