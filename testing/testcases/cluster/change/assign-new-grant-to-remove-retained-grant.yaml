# A new grant assigned to a shard with a retained grant replaces the retained grant.
actions:
  - action: create
  - action: snapshot
    shards:
      - shard: range=(0:a),type=G
    assignments:
      - consumer: c1
        grants:
          - id: 0A
            shard: range=(0:a),type=G
            state: active

  # Apply new snapshot with the same shards to mark grants as retained
  - action: snapshot
    shards:
      - shard: range=(0:a),type=G

  # Assign a new grant for the same shard as the retained grant
  - action: change
    assignments:
      - consumer: c2
        grants:
          - id: 0A_New
            shard: range=(0:a),type=G
            state: active

  # The retained grant should be removed
  - action: compare
    version: 4
    shards:
      - shard: range=(0:a),type=G
        grants: [0A_New]
    assignments:
      - consumer: c1
        grants: []
      - consumer: c2
        grants:
          - id: 0A_New
            shard: range=(0:a),type=G
            state: active

  - action: lookup
    lookups:
      - key: "1"
        expected:
          grant: 0A_New
          consumer: c2
